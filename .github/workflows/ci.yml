name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Use bash on every runner (Git Bash on Windows) so build scripts are uniform.
defaults:
  run:
    shell: bash

jobs:
  # ─── Lint & Test (all three OSes) ─────────────────────────────────────────
  test:
    name: Lint & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history needed for git rev-list (.build-number)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ─── Build installers per OS ──────────────────────────────────────────────
  # node-pty / serialport native modules cannot be cross-compiled, so each OS
  # builds on its own runner. electron-builder targets the host OS.
  build:
    name: Build (${{ matrix.name }})
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux packaging deps (deb)
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fakeroot dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        # No --mac/--win/--linux flag: electron-builder targets the host OS.
        # --publish never — the release job handles GitHub Releases.
        # Retry up to 3× — hdiutil (mac DMG) / appimage steps can flake on CI.
        run: |
          npm run prebuild
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            if npx electron-builder --publish never; then
              echo "Build succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then echo "Build failed after 3 attempts"; exit 1; fi
            echo "Build failed, retrying in 10s..."
            sleep 10
          done
        env:
          # macOS: ad-hoc signing is done in build/afterPack.js — stop
          # electron-builder from hunting for a Developer ID cert.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prateek-term-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          retention-days: 30
          if-no-files-found: ignore

  # ─── GitHub Release (all platforms' artifacts) ────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.yml' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..HEAD"; else RANGE="HEAD"; fi

          get_commits() {
            local prefix="$1"
            git log $RANGE --pretty=format:"%s" --no-merges \
              | grep -E "^${prefix}(\(.+\))?:" \
              | sed "s/^${prefix}(\(.*\)): /\`\1\` — /" \
              | sed "s/^${prefix}: //" \
              | sed 's/^/- /' \
              || true
          }
          FEATS=$(get_commits "feat")
          FIXES=$(get_commits "fix")
          PERFS=$(get_commits "perf")
          REFACTORS=$(get_commits "refactor")
          DOCS=$(get_commits "docs")
          CHORES=$(get_commits "chore|ci|test")

          BODY="## Prateek-Term ${VERSION}

          Cross-platform — macOS, Windows, and Linux.

          ### Download
          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | \`Prateek-Term-${VERSION}-arm64.dmg\` |
          | Windows | \`Prateek-Term Setup ${VERSION}.exe\` (installer) / portable .exe |
          | Linux | \`Prateek-Term-${VERSION}.AppImage\` / \`.deb\` |

          > **macOS:** ad-hoc signed — right-click the app -> Open -> Open anyway if Gatekeeper warns.
          > **Windows:** unsigned — click \"More info\" -> \"Run anyway\" on the SmartScreen prompt.
          "

          [ -n "$FEATS" ]     && BODY="${BODY}
          ### New Features
          ${FEATS}"
          [ -n "$FIXES" ]     && BODY="${BODY}
          ### Bug Fixes
          ${FIXES}"
          [ -n "$PERFS" ]     && BODY="${BODY}
          ### Performance
          ${PERFS}"
          [ -n "$REFACTORS" ] && BODY="${BODY}
          ### Improvements
          ${REFACTORS}"
          [ -n "$DOCS" ]      && BODY="${BODY}
          ### Documentation
          ${DOCS}"
          [ -n "$CHORES" ]    && BODY="${BODY}
          ### Maintenance
          ${CHORES}"

          echo "$BODY" > release-notes.md
          cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "Prateek-Term ${{ needs.build.outputs.version }}"
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
